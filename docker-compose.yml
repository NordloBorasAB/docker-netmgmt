services:
  traefik:
    image: traefik:2.11.50
    container_name: traefik
    command:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--log=true"
      - "--log.level=INFO"
      - "--entrypoints.http=true"
      - "--entrypoints.http.address=:80"
      - "--entrypoints.http.http.redirections.entrypoint.to=https"
      - "--entrypoints.http.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.https=true"
      - "--entrypoints.https.address=:443"
      #- "--certificatesresolvers.letsencrypt" 
      #- "--certificatesresolvers.letsencrypt.acme.storage=acme.json" 
      #- "--certificatesresolvers.letsencrypt.acme.email=${EMAIL}" 
      #- "--certificatesresolvers.letsencrypt.acme.httpchallenge" 
      #- "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=http" 
      - "--providers.docker"
      - "--providers.docker.watch=true"
      - "--providers.docker.exposedbydefault=false"
      - "--serverstransport.insecureskipverify=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

    ports:
      - target: 80
        published: 80
        protocol: tcp
      - target: 443
        published: 443
        protocol: tcp
    volumes:
      # Uncomment the following line if you want to use your own certificates
      #- "./certs/:/etc/traefik/dynamic/:ro" 
      #- "./acme.json:/acme.json"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
           - net1
    restart: unless-stopped

  db:
    image: mariadb:12.3.2
    container_name: librenms_db
    command:
      - "mariadbd"
      - "--sql-mode="
      - "--innodb-file-per-table=1"
      - "--lower-case-table-names=0"
      - "--character-set-server=utf8"
      - "--collation-server=utf8_unicode_ci"
    volumes:
      - "./db:/var/lib/mysql"
    environment:
      - "TZ=${TZ}"
      - "MYSQL_ALLOW_EMPTY_PASSWORD=yes"
      - "MYSQL_DATABASE=${MYSQL_DATABASE}"
      - "MYSQL_USER=${MYSQL_USER}"
      - "MYSQL_PASSWORD=${MYSQL_PASSWORD}"
      - "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}"
    networks:
            - net1
    restart: unless-stopped

  memcached:
    image: memcached:1.6.42-alpine
    container_name: librenms_memcached
    environment:
      - "TZ=${TZ}"
    networks:
            - net1
    restart: unless-stopped

  redis:
    image: docker.io/valkey/valkey:9.0-alpine
    container_name: librenms_redis
    environment:
      - "TZ=${TZ}"
    networks:
            - net1
    restart: always

  smtp:
    image: juanluisbaptiste/postfix:1.8.3
    container_name: librenms_smtp
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      - "SERVER_HOSTNAME=${LIBREDOMAIN}"
      - "SMTP_SERVER=${SMTP_SERVER}"
      - "SMTP_USERNAME=${SMTP_USERNAME}"
      - "SMTP_PASSWORD=${SMTP_PASSWORD}"
    networks:
            - net1
    restart: unless-stopped

  librenms:
    image: librenms/librenms:26.6.1
    container_name: librenms
    domainname: ${LIBREDOMAIN}
    hostname: librenms
    depends_on:
      - db
      - memcached
      - smtp
    volumes:
      - "./librenms:/data"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.librenms.entrypoints=https"
      - "traefik.http.routers.librenms.rule=Host(`${LIBREDOMAIN}`)"
      - "traefik.http.routers.librenms.tls=true"
      - "traefik.http.routers.librenms.tls.domains[0].main=${LIBREDOMAIN}"
      - "traefik.http.services.librenms.loadbalancer.server.port=8000"
    environment:
      - "TZ=${TZ}"
      - "PUID=${PUID}"
      - "PGID=${PGID}"
      - "DB_HOST=db"
      - "DB_NAME=${MYSQL_DATABASE}"
      - "DB_USER=${MYSQL_USER}"
      - "DB_PASSWORD=${MYSQL_PASSWORD}"
      - "DB_TIMEOUT=60"
      - "APP_TRUSTED_PROXIES=${SUBNET}"
    env_file:
      - "./librenms.env"
    networks:
           net1:
            ipv4_address: ${LIBREIP}
    restart: unless-stopped

  dispatcher:
    image: librenms/librenms:26.6.1
    container_name: librenms_dispatcher
    hostname: librenms-dispatcher
    depends_on:
      - librenms
      - redis
    volumes:
      - "./librenms:/data"
    env_file:
      - "./librenms.env"
    environment:
      - "TZ=${TZ}"
      - "PUID=${PUID}"
      - "PGID=${PGID}"
      - "DB_HOST=db"
      - "DB_NAME=${MYSQL_DATABASE}"
      - "DB_USER=${MYSQL_USER}"
      - "DB_PASSWORD=${MYSQL_PASSWORD}"
      - "DB_TIMEOUT=60"
      - "DISPATCHER_NODE_ID=dispatcher1"
      - "REDIS_HOST=redis"
      - "REDIS_PORT=6379"
      - "REDIS_DB=0"
      - "SIDECAR_DISPATCHER=1"
    networks:
            - net1
    restart: always

  syslog-ng:
    image: librenms/librenms:26.6.1
    container_name: librenms_syslog
    domainname: ${LIBREDOMAIN}
    hostname: librenms
    depends_on:
      - librenms
    ports:
      - target: 514
        published: 514
        protocol: tcp
      - target: 514
        published: 514
        protocol: udp
    volumes:
      - "./librenms:/data"
    environment:
      - "TZ=${TZ}"
      - "PUID=${PUID}"
      - "PGID=${PGID}"
      - "DB_HOST=db"
      - "DB_NAME=${MYSQL_DATABASE}"
      - "DB_USER=${MYSQL_USER}"
      - "DB_PASSWORD=${MYSQL_PASSWORD}"
      - "DB_TIMEOUT=60"
      - "SIDECAR_SYSLOGNG=1"
    env_file:
      - "./librenms.env"
    networks:
            - net1
    restart: unless-stopped

#  oxidized:
#    restart: unless-stopped
#    image: oxidized/oxidized:0.33.0
#    environment:
#      - TZ=${TZ}
#      - CONFIG_RELOAD_INTERVAL=600
#    volumes:
#      - ./oxidized:/home/oxidized/.config/oxidized
#    #command removes pid-file if it exists on boot. Prevents fail on boot.
#    command: bash -c 'rm ~/.config/oxidized/pid; /sbin/my_init'
#    networks:
#           net1:
#              ipv4_address: ${OXIDIP}

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    security_opt:
      -  no-new-privileges:true
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./portainer:/data"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.entrypoints=https"
      - "traefik.http.routers.portainer.rule=Host(`${PORTAINERDOMAIN}`)"
      - "traefik.http.services.portainer.loadbalancer.server.scheme=https"
      - "traefik.http.services.portainer.loadbalancer.server.port=9443"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.domains[0].main=${PORTAINERDOMAIN}"
    networks:
            - net1
  
  netbox:
    image: netboxcommunity/netbox:v4.5.10-4.0.2
    container_name: netbox
    depends_on:
    - netbox-postgres
    - netbox-redis
    - netbox-redis-cache
    #- netbox-worker
    env_file: ./netbox/env/netbox.env
    environment:
      SKIP_STARTUP_SCRIPTS: ${SKIP_STARTUP_SCRIPTS-false}
    user: 'netbox:root'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netbox.entrypoints=https"
      - "traefik.http.routers.netbox.rule=Host(`${NETBOXDOMAIN}`)"
      - "traefik.http.routers.netbox.tls=true"
      - "traefik.http.routers.netbox.tls.domains[0].main=${NETBOXDOMAIN}"
      - "traefik.http.services.netbox.loadbalancer.server.port=8080"
    volumes:
      - ./netbox/configuration:/etc/netbox/config:z,ro
      - ./netbox/reports:/opt/netbox/netbox/reports:z,rw
      - ./netbox/scripts:/opt/netbox/netbox/scripts:z,rw
      - ./netbox/netbox-media-files:/opt/netbox/netbox/media:zrw
    networks:
           net1:
            ipv4_address: ${NETBOXIP}
    restart: unless-stopped

  #netbox-worker:
  #  <<: *netbox
  #  depends_on:
  #  - redis
  #  - postgres
  #  command:
  #  - /opt/netbox/venv/bin/python
  #  - /opt/netbox/netbox/manage.py
  #  - rqworker
  #netbox-housekeeping:
  #  <<: *netbox
  #  depends_on:
  #  - redis
  #  - postgres
  #  command:
  #  - /opt/netbox/housekeeping.sh

  netbox-postgres:
    image: postgres:18.4-alpine
    container_name: netbox-postgres
    env_file: ./netbox/env/postgres.env
    volumes:
      - ./netbox/netbox-postgres-data:/var/lib/postgresql/18/docker
    networks:
            - net1
    restart: unless-stopped

  netbox-redis:
    image: docker.io/valkey/valkey:9.0-alpine
    container_name: netbox-redis
    command:
      - sh
      - -c # this is to evaluate the $REDIS_PASSWORD from the env
      - redis-server --appendonly yes --requirepass $$REDIS_PASSWORD ## $$ because of docker-compose
    env_file: ./netbox/env/redis.env
    volumes:
      - ./netbox/netbox-redis-data:/data
    networks:
            - net1
    restart: unless-stopped

  netbox-redis-cache:
    image: docker.io/valkey/valkey:9.0-alpine
    container_name: netbox-redis-cache
    command:
      - sh
      - -c # this is to evaluate the $REDIS_PASSWORD from the env
      - redis-server --requirepass $$REDIS_PASSWORD ## $$ because of docker-compose
    env_file: ./netbox/env/redis-cache.env
    volumes:
      - ./netbox/netbox-redis-cache-data:/data
    networks:
            - net1
    restart: unless-stopped

networks:
        net1:
          driver: bridge
          ipam:
            driver: default
            config:
                    - subnet: ${SUBNET}
