  phpipam-web:
    container_name: phpipam
    image: phpipam/phpipam-www:1.8x
    environment:
      - TZ=${TZ}
      - IPAM_DATABASE_HOST=phpipam-mariadb
      - IPAM_DATABASE_PASS=${IPAM_DATABASE_PASS}
      - IPAM_DATABASE_WEBHOST=%
      - IPAM_TRUST_X_FORWARDED=true
      # Uncomment line below after install
      #- IPAM_DISABLE_INSTALLER=1
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpipam.entrypoints=https"
      - "traefik.http.routers.phpipam.rule=Host(`${IPAMDOMAIN}`)"
      - "traefik.http.routers.phpipam.tls=true"
      - "traefik.http.routers.phpipam.tls.domains[0].main=${IPAMDOMAIN}"
      - "traefik.http.services.phpipam.loadbalancer.server.port=80"
    volumes:
      - "./phpipam-logo:/phpipam/css/images/logo"
    depends_on:
      - phpipam-mariadb
    networks:
            - net1

  phpipam-cron:
    container_name: phpipam_cron
    image: phpipam/phpipam-cron:1.8x
    environment:
      - TZ=${TZ}
      - IPAM_DATABASE_HOST=phpipam-mariadb
      - IPAM_DATABASE_PASS=${IPAM_DATABASE_PASS}
      - SCAN_INTERVAL=1h
    restart: unless-stopped
    depends_on:
      - phpipam-mariadb
    networks:
            - net1

  phpipam-mariadb:
    container_name: phpipam_db
    image: mariadb:12.3.2
    environment:
      - MYSQL_ROOT_PASSWORD=${IPAMMYSQL_ROOT_PASSWORD}
    restart: unless-stopped
    volumes:
      - "./phpipam-db-data:/var/lib/mysql"
    networks:
            - net1
  
  pwpush:
    image: pglombardo/pwpush-ephemeral:latest
    hostname: pwpush
    container_name: pwpush
    environment:
      FORCE_SSL: ''
      EXPIRE_AFTER_DAYS_DEFAULT: '1'
      EXPIRE_AFTER_VIEWS_DEFAULT: '1'
      RETRIEVAL_STEP_DEFAULT: 'true'
      PWP__BRAND__SHOW_FOOTER_MENU: 'false'
      PWP__BRAND__TITLE: 'Password Pusher'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pwpush.entrypoints=https"
      - "traefik.http.routers.pwpush.rule=Host(`${PWPUSHDOMAIN}`)"
      - "traefik.http.routers.pwpush.tls=true"
      - "traefik.http.routers.pwpush.tls.domains[0].main=${PWPUSHDOMAIN}"
      - "traefik.http.services.pwpush.loadbalancer.server.port=5100"
    networks:
      - net1
    restart: always
    
  smokeping:
    image: lscr.io/linuxserver/smokeping:latest
    container_name: smokeping
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Stockholm
    dns:
      - 1.1.1.1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.smokeping.entrypoints=https"
      - "traefik.http.routers.smokeping.rule=Host(`${SMOKEDOMAIN}`)"
      - "traefik.http.routers.smokeping.tls=true"
      - "traefik.http.routers.smokeping.tls.domains[0].main=${SMOKEDOMAIN}"
      - "traefik.http.services.smokeping.loadbalancer.server.port=80"
    volumes:
      - ./smokeping/data:/data:rw
      - ./smokeping/config:/config:ro
    networks:
      - net1
         # ipv4_address: ${SMOKEIP}
    restart: unless-stopped
